<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Text Appeal\u2122 - Offline</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'DM Sans', system-ui, sans-serif;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100dvh;
    background: #1a1a2e;
    color: #e8dcc8;
    text-align: center;
    padding: 20px;
  }
  .offline-card {
    max-width: 320px;
  }
  h1 { font-size: 22px; margin-bottom: 12px; color: #d4a843; }
  p { font-size: 14px; line-height: 1.6; opacity: 0.8; }
  .retry {
    margin-top: 20px;
    padding: 10px 24px;
    border-radius: 8px;
    border: 1px solid #d4a843;
    background: transparent;
    color: #d4a843;
    font-size: 14px;
    cursor: pointer;
  }
</style>
</head>
<body>
<div class="offline-card">
  <h1>Text Appeal\u2122</h1>
  <p>You appear to be offline. Translation requires an internet connection to reach the language model.</p>
  <button class="retry" onclick="location.reload()">Retry</button>
</div>
</body>
</html>
